
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Buenas noches Quetzali</title>

<style>
body{
    background:#0d1b2a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    overflow:hidden;
    font-family:Arial;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

#mensaje{
    margin-top:20px;
    color:white;
    font-size:30px;
    text-align:center;
    display:none;
}
</style>
</head>

<body>

<button onclick="mostrarMensaje()">
🌙 click
</button>

<div id="mensaje">
✨Buenas noches Quetzali ❤️‍🩹✨
</div>

<script>
function mostrarMensaje(){
    document.getElementById("mensaje").style.display="block";
}
</script>

</body>
</html>
